version: 1
meta:
  title: Enterprise AI Operating Model
  language: en
slides:
  - layout: cover_title
    title: Enterprise AI Operating Model
    subtitle: Executive review for responsible scale-up
    date: June 2026
    organization: Enterprise AI Office
    author: Strategy and Risk Enablement
  - layout: section_divider
    title: Current State
    subtitle: Where the operating model needs executive alignment
    section_no: "01"
  - layout: agenda
    title: Discussion Flow
    subtitle: From current-state exposure to the next operating cadence
    items:
      - Adoption signals and risk exposure
      - Governance model and decision rights
      - Control maturity and implementation roadmap
      - Executive decisions requested
  - layout: comparison_2col
    title: Governance Model Shift
    subtitle: Moving from local experimentation to enterprise-grade control
    left:
      title: Current pattern
      description: Teams run isolated pilots with uneven review depth and limited reuse of controls.
      bullets:
        - text: Policy interpretation varies by business unit
          level: 0
        - text: Model and data reviews remain manual
          level: 0
        - text: Evidence collection happens late in delivery
          level: 0
      icon:
        pack: heroicons
        name: beaker
        variant: outline
    right:
      title: Target pattern
      description: A repeatable intake, review, and evidence model supports faster scaled deployment.
      bullets:
        - text: One intake standard for risk classification
          level: 0
        - text: Control templates embedded in delivery
          level: 0
        - text: Continuous evidence capture for audit readiness
          level: 0
      icon:
        pack: heroicons
        name: shield-check
        variant: outline
  - layout: three_cards_vertical
    title: Priority Workstreams
    subtitle: Three workstreams should be managed as one program
    cards:
      - title: Policy to workflow
        description: Translate AI policy into intake questions, review checkpoints, and evidence artifacts.
        icon:
          pack: heroicons
          name: clipboard-document-check
          variant: outline
      - title: Platform controls
        description: Standardize logging, prompt review, data boundary controls, and model access approvals.
        icon:
          pack: heroicons
          name: command-line
          variant: outline
      - title: Operating cadence
        description: Establish weekly triage, monthly risk review, and quarterly executive steering.
        icon:
          pack: heroicons
          name: calendar-days
          variant: outline
  - layout: chart_basic
    title: Control Maturity by Quarter
    subtitle: Target state assumes controls become reusable assets by Q4
    chart:
      kind: column
      categories: [Q1, Q2, Q3, Q4]
      series:
        - name: Intake coverage
          values: [35, 58, 76, 90]
        - name: Evidence automation
          values: [18, 36, 61, 82]
    caption: Scores represent estimated coverage across prioritized AI use cases.
  - layout: table_basic
    title: Decision Register
    subtitle: Decisions required to move from pilots to repeatable production governance
    table:
      headers: [Decision, Owner, Timing, Impact]
      rows:
        - [Approve common intake taxonomy, AI Steering Committee, June, Enables portfolio reporting]
        - [Mandate evidence template, Risk and Compliance, July, Reduces audit preparation time]
        - [Fund control automation, Technology, July, Improves release throughput]
    caption: Each decision reduces delivery friction while increasing control consistency.
  - layout: list_basic
    title: Implementation Roadmap
    subtitle: Build the governance muscle without slowing approved delivery
    items:
      - text: "Weeks 1-2: confirm policy taxonomy and business-unit intake owners"
        level: 0
      - text: "Weeks 3-6: publish control templates and evidence examples"
        level: 0
      - text: "Weeks 7-10: automate logging and approval-state capture"
        level: 0
      - text: "Weeks 11-12: run executive readiness review"
        level: 0
  - layout: image_caption
    title: Operating Model Signal
    subtitle: One visible system of accountability replaces fragmented local trackers
    icon:
      pack: heroicons
      name: presentation-chart-line
      variant: outline
    caption: A single dashboard should show stage, risk class, evidence, and release decision.
    attribution: Internal operating model concept for executive review.
  - layout: appendix_backup
    title: "Appendix: Readiness Criteria"
    subtitle: Minimum conditions for production approval
    body: These criteria define whether an AI use case can move from pilot to controlled production use.
    items:
      - Intake classification completed
      - Data boundary reviewed
      - Human oversight documented
      - Prompt and model evaluation evidence attached
    references:
      - Enterprise AI Policy v2.1
      - Model Risk Review Checklist
      - Security Logging Standard
  - layout: closing_end
    title: Executive Decisions Requested
    subtitle: Approve the next operating-model phase
    message: Confirm governance scope, control automation funding, and review cadence.
    contact: Enterprise AI Office
    cta: Approve phase 2 mobilization by June 30
