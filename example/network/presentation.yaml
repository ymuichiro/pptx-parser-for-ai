version: "2.0"
theme: "modern-minimal"
metadata:
  title: "System Architecture"
  author: "Architecture Guild"
  date: "2026-02-10"
slides:
  - type: section
    title: "Architecture"
    subtitle: "Service Topology"
    background:
      color: primary
      opacity: 1
  - type: content
    title: "Service Topology Diagram"
    content:
      - type: network-diagram
        layout: hierarchical
        nodes:
          - id: edge
            label: Edge
            color: primary
          - id: app
            label: App
            color: accent
          - id: worker
            label: Worker
            color: success
          - id: db
            label: DB
            color: success
        edges:
          - from: edge
            to: app
          - from: app
            to: worker
          - from: worker
            to: db
  - type: content
    title: "Request Lifecycle"
    content:
      - type: two-column
        ratio: "1:1"
        left:
          - type: numbered-list
            items:
              - "Receive request at edge"
              - "Authorize via gateway policy"
              - "Dispatch to app and worker"
              - "Persist result and return response"
          - type: bullet-list
            style: checkmark
            items:
              - "Ingress is restricted to TLS 1.3"
              - "Application tier is isolated from data tier"
              - "Worker-to-DB communication uses least privilege"
        right:
          - type: table
            style: bordered
            headers: ["Step", "SLO", "Owner"]
            rows:
              - ["Ingress", "<50ms", "Platform"]
              - ["Business logic", "<120ms", "Application"]
              - ["Persistence", "<80ms", "Data"]
