name: Bug report
description: Report a defect in parser, renderer, or docs
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue. Please include a minimal reproduction.
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: YAML/TS snippet and command you ran
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
