version: "2.0"
theme: "modern-minimal"
metadata:
  title: "Network"
slides:
  - type: content
    title: "Topology"
    content:
      - type: network-diagram
        layout: force-directed
        nodes:
          - id: a
            label: A
          - id: b
            label: B
        edges:
          - from: a
            to: b
      - type: flowchart
        direction: vertical
        steps:
          - id: s
            label: Start
          - id: e
            label: End
        flows:
          - from: s
            to: e
